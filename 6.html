<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 phrases essentielles - Leçon supplémentaire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Poppins:wght@400;600&display=swap');

        :root {
            --primary: #4F46E5;
            --primary-dark: #3730A3;
            --bg-color: #F8FAFC;
            --nav-height: 70px;
        }

        body {
            font-family: 'Poppins', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            overflow: hidden; 
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            color: #1E293B;
        }

        .app-container {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2vh 4vw;
            box-sizing: border-box;
            overflow: hidden;
            width: 100%;
        }

        .content-box {
            width: 100%;
            max-width: 1200px;
            max-height: 100%;
            min-height: 0;
            margin: auto;
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .content-box.active {
            opacity: 1;
            transform: translateY(0);
        }

        .title-main {
            font-size: clamp(1.5rem, 5vh, 3.5rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1.5vh;
            flex-shrink: 0;
        }

        .subtitle-main {
            font-size: clamp(1rem, 2.5vh, 1.5rem);
            color: var(--primary);
            font-weight: 500;
            margin-bottom: 1vh;
            flex-shrink: 0;
        }

        .desc-text {
            font-size: clamp(1rem, 2.5vh, 1.7rem);
            line-height: 1.5;
            max-width: 800px;
            width: 100%;
            margin-left: auto;
            margin-right: auto;
            flex-shrink: 1;
            min-height: 0; 
            overflow-y: auto;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .char-card {
            background: white;
            border-radius: clamp(1rem, 3vh, 2rem);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            padding: clamp(1rem, 4vh, 3rem);
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: clamp(120px, 20vw, 320px);
            max-height: 55vh;
            border: 2px solid #F1F5F9;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }

        .nav-bar {
            width: 100%;
            height: var(--nav-height);
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid #E2E8F0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            z-index: 100;
            box-sizing: border-box;
        }

        .btn-nav {
            padding: 0.6rem clamp(1rem, 2vw, 1.5rem);
            border-radius: 9999px;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: clamp(0.875rem, 2vh, 1rem);
        }

        .btn-nav:disabled { opacity: 0.2; cursor: not-allowed; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-secondary { color: #64748B; border: 1px solid #CBD5E1; }

        .mic-btn {
            width: clamp(60px, 10vh, 90px);
            height: clamp(60px, 10vh, 90px);
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.5rem, 4vh, 2.5rem);
            margin: 2vh auto;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .mic-btn:disabled { background: #CBD5E1; }
        .mic-btn.recording { background: #EF4444; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .status-large { font-size: clamp(1.2rem, 3.5vh, 1.8rem); font-weight: 600; }

        @media (max-width: 640px) { .nav-bar { padding: 0 1rem; } .btn-nav span { display: none; } }
    </style>
</head>
<body>

    <main class="app-container">
        <div id="lesson-content" class="content-box"></div>
    </main>

    <nav class="nav-bar">
        <button id="prev-btn" class="btn-nav btn-secondary" onclick="movePage(-1)">
            <i class="ph ph-caret-left"></i> <span>Précédent</span>
        </button>
        <div id="progress" class="text-[10px] sm:text-xs font-bold text-slate-400 uppercase tracking-widest text-center"></div>
        <button id="next-btn" class="btn-nav btn-primary" onclick="movePage(1)">
            <span>Suivant</span> <i class="ph ph-caret-right"></i>
        </button>
    </nav>

    <script>
        const pages = [
            { type: 'cover', subtitle: '8 phrases essentielles', title: 'Leçon supplémentaire - 100% Oral', btnText: 'Commencer', isCompleted: true },
            { type: 'info-only', cardText: '지금까지 배운 표현들을 다시 한번 따라 해 보세요.', sub2: 'Répétez une fois de plus les expressions que vous avez apprises.', isCompleted: true },
            // Part 1: Repeat (Pages 2-9)
            { type: 'speech', text: 'Répétez après moi.', display: '안녕하세요?', sub1: 'être en paix ?', sub2: 'Bonjour', target: '안녕하세요', targetAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775194335/S6-1_nosfbm.mp3', isCompleted: false },
            { type: 'speech', text: 'Répétez après moi.', display: '안녕하십니까?', sub1: 'être en paix ?', sub2: 'Bonjour', target: '안녕하십니까', targetAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775194335/S6-2_bp3og9.mp3', isCompleted: false },
            { type: 'speech', text: 'Répétez après moi.', display: '감사합니다.', sub2: 'Merci', target: '감사합니다', targetAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775194340/S6-3_qxlhmh.mp3', isCompleted: false },
            { type: 'speech', text: 'Répétez après moi.', display: '고마워요.', sub2: 'Merci', target: '고마워요', targetAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775194341/S6-4_fqapuj.mp3', isCompleted: false },
            { type: 'speech', text: 'Répétez après moi.', display: '죄송합니다.', sub2: 'Je suis désolé.', target: '죄송합니다', targetAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775194343/S6-5_yhxcgd.mp3', isCompleted: false },
            { type: 'speech', text: 'Répétez après moi.', display: '미안해요.', sub2: 'Je suis désolé.', target: '미안해요', targetAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775194345/S6-6_zlk2bg.mp3', isCompleted: false },
            { type: 'speech', text: 'Répétez après moi.', display: '안녕히 가세요.', sub1: 'Partez bien.', sub2: 'Au revoir.', target: '안녕히 가세요', targetAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775194347/S6-7_tcwrhf.mp3', isCompleted: false },
            { type: 'speech', text: 'Répétez après moi.', display: '안녕히 계세요.', sub1: 'Restez bien.', sub2: 'Au revoir.', target: '안녕히 계세요', targetAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775194349/S6-8_krqqgv.mp3', isCompleted: false },
            
            // Part 2: Speak (Pages 10-18)
            { type: 'info-only', cardText: '한국어로 말해 보세요.', sub2: 'Parlez en coréen.', isCompleted: true },
            { type: 'speech', text: '한국어로 말해 보세요.', display: '__하세요?', sub1: 'être en paix ?', sub2: 'Bonjour', target: '안녕하세요', targetAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775194335/S6-1_nosfbm.mp3', isCompleted: false },
            { type: 'speech', text: '한국어로 말해 보세요.', display: '안녕____?', sub1: 'être en paix ?', sub2: 'Bonjour', target: '안녕하십니까', targetAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775194335/S6-2_bp3og9.mp3', isCompleted: false },
            { type: 'speech', text: '한국어로 말해 보세요.', display: '__합니다.', sub2: 'Merci', target: '감사합니다', targetAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775194340/S6-3_qxlhmh.mp3', isCompleted: false },
            { type: 'speech', text: '한국어로 말해 보세요.', display: '고마__.', sub2: 'Merci', target: '고마워요', targetAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775194341/S6-4_fqapuj.mp3', isCompleted: false },
            { type: 'speech', text: '한국어로 말해 보세요.', display: '__합니다.', sub2: 'Je suis désolé.', target: '죄송합니다', targetAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775194343/S6-5_yhxcgd.mp3', isCompleted: false },
            { type: 'speech', text: '한국어로 말해 보세요.', display: '__해요.', sub2: 'Je suis désolé.', target: '미안해요', targetAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775194345/S6-6_zlk2bg.mp3', isCompleted: false },
            { type: 'speech', text: '한국어로 말해 보세요.', display: '안녕히 ___.', sub1: 'Partez bien.', sub2: 'Au revoir.', target: '안녕히 가세요', targetAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775194347/S6-7_tcwrhf.mp3', isCompleted: false },
            { type: 'speech', text: '한국어로 말해 보세요.', display: '___ _세요.', sub1: 'Restez bien.', sub2: 'Au revoir.', target: '안녕히 계세요', targetAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775194349/S6-8_krqqgv.mp3', isCompleted: false },
            
            { type: 'outro', text: "Bravo ! Vous n'avez vraiment plus de soucis à vous faire pour votre voyage en Corée désormais, n'est-ce pas ? Continuez à étudier le coréen dans nos prochains programmes pour apprendre encore plus d'expressions et de mots. Si jamais vous confondez les salutations, vous pouvez revenir ici quand vous le souhaitez. Alors, à très bientôt !", audio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775194337/6-outro_ukwzgm.wav', isCompleted: true }
        ];

        let currentPage = 0;
        let currentAudio = null;
        let interactionAudio = null;
        let backgroundAudioTimeout = null;
        let transitionSynth, correctSound, completionSound, wrongSound;

        let mediaRecorder;
        let audioChunks = [];
        let currentStream = null;
        let speechTries = 0;
        let recordingTimer = null;
        const RECORDING_LIMIT = 6000; 

        const BASE_44_ORIGIN = "https://coreeno.base44.app";
        const CLOVA_API_FUNCTION_URL = BASE_44_ORIGIN + '/api/functions/naverClovaSpeech';

        window.onload = () => {
            Tone.Destination.volume.value = -8;
            transitionSynth = new Tone.Synth().toDestination();
            correctSound = new Tone.PolySynth().toDestination();
            wrongSound = new Tone.PolySynth().toDestination();
            completionSound = new Tone.PolySynth().toDestination();
            renderPage();
            window.addEventListener('blur', stopAllAudio);
        };

        function stopAllAudio() {
            if (backgroundAudioTimeout) { clearTimeout(backgroundAudioTimeout); backgroundAudioTimeout = null; }
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio = null; }
            if (interactionAudio) { interactionAudio.pause(); interactionAudio.currentTime = 0; interactionAudio = null; }
        }

        function playBackgroundAudio(url, delay = 0) {
            if (backgroundAudioTimeout) clearTimeout(backgroundAudioTimeout);
            if (!url) return; 
            backgroundAudioTimeout = setTimeout(() => {
                if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
                currentAudio = new Audio(url);
                currentAudio.play().catch(e => {});
            }, delay);
        }

        function playInteractionAudio(url, onEndedCallback = null) {
            if (!url) { if (onEndedCallback) onEndedCallback(); return; }
            if (backgroundAudioTimeout) { clearTimeout(backgroundAudioTimeout); backgroundAudioTimeout = null; }
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            if (interactionAudio) { interactionAudio.pause(); interactionAudio.currentTime = 0; }
            interactionAudio = new Audio(url);
            if (onEndedCallback) interactionAudio.onended = onEndedCallback;
            interactionAudio.play().catch(e => { if (onEndedCallback) onEndedCallback(); });
        }

        window.playInteractionWithMicLock = function(url) {
            const micBtn = document.getElementById('mic-btn');
            if (micBtn && micBtn.classList.contains('recording')) return;
            if (micBtn) { micBtn.disabled = true; micBtn.classList.add('opacity-50', 'cursor-not-allowed'); }
            playInteractionAudio(url, () => {
                const btn = document.getElementById('mic-btn');
                if (btn && !btn.classList.contains('recording')) {
                    btn.disabled = false; btn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            });
        };

        function movePage(step) {
            const nextIdx = currentPage + step;
            if (nextIdx >= 0 && nextIdx < pages.length) {
                stopAllAudio();
                stopMicrophone(); 
                transitionSynth.triggerAttackRelease("C4", "8n");
                currentPage = nextIdx;
                speechTries = 0; 
                renderPage();
            }
        }

        function renderPage() {
            const page = pages[currentPage];
            const container = document.getElementById('lesson-content');
            const nextBtn = document.getElementById('next-btn');
            const prevBtn = document.getElementById('prev-btn');
            const progress = document.getElementById('progress');
            const navBar = document.querySelector('.nav-bar');

            progress.innerText = `Page ${currentPage + 1} / ${pages.length}`;
            container.classList.remove('active');
            
            setTimeout(() => {
                container.innerHTML = '';
                let html = '';

                navBar.style.display = 'flex';
                nextBtn.style.display = 'flex';
                prevBtn.style.display = 'flex';

                if (page.type === 'outro') {
                    navBar.style.display = 'none';
                    if (!window.lessonCompletedSent) {
                        completionSound.triggerAttackRelease(["E5", "G5", "C6", "E6"], "2n");
                        window.parent.postMessage({ type: 'lesson_complete' }, '*');
                        window.lessonCompletedSent = true;
                    }
                } else {
                    nextBtn.disabled = (currentPage === pages.length - 1) || !page.isCompleted;
                    prevBtn.disabled = (currentPage === 0 || currentPage === pages.length - 1);
                }

                switch (page.type) {
                    case 'cover':
                        html = `<div class="flex flex-col items-center w-full"><h2 class="subtitle-main">${page.subtitle}</h2><h1 class="title-main">${page.title}</h1><button onclick="movePage(1)" class="mt-4 px-10 py-3 bg-indigo-600 text-white rounded-full text-lg font-bold hover:bg-indigo-700 transition-all shadow-lg shrink-0">${page.btnText}</button></div>`;
                        nextBtn.style.display = 'none'; prevBtn.style.display = 'none'; break;

                    case 'info-only':
                        html = `<div class="flex flex-col items-center w-full"><div class="char-card mb-6 px-6 sm:px-12 shrink-0"><div class="font-bold text-indigo-700 text-center leading-tight" style="font-size: clamp(1.2rem, 4vh, 2.5rem);">${page.cardText}</div>${page.sub2 ? `<p class="text-slate-500 font-medium text-sm sm:text-base mt-4 text-center px-4">${page.sub2}</p>` : ''}</div></div>`;
                        break;

                    case 'speech':
                        html = `
                            <div class="flex flex-col items-center w-full">
                                <h2 class="subtitle-main text-slate-900 mb-4">${page.text}</h2>
                                <div class="char-card shrink-0 mb-4 cursor-pointer hover:scale-105 hover:shadow-lg hover:border-indigo-300 transition-all border-2 border-slate-100" onclick="playInteractionWithMicLock('${page.targetAudio}')">
                                    <div id="target-char" class="font-bold tracking-tight text-center leading-tight transition-colors duration-500 ${page.isCompleted && !page.hideScore ? 'text-green-500' : 'text-indigo-600'}" style="font-size: clamp(2rem, 6vh, 4rem);">${page.display}</div>
                                    ${page.sub1 ? `<p class="text-indigo-400 font-bold uppercase tracking-widest text-xs sm:text-sm mt-3 text-center px-2">${page.sub1}</p>` : ''}
                                    ${page.sub2 ? `<p class="text-slate-600 font-medium text-sm sm:text-base mt-1 text-center px-4">${page.sub2}</p>` : ''}
                                    <div class="mt-3 bg-indigo-50 text-indigo-500 rounded-full p-2 hover:bg-indigo-100 transition-colors"><i class="ph ph-speaker-high text-2xl"></i></div>
                                </div>
                                <div id="speech-ui-container" class="flex flex-col items-center shrink-0 min-h-[140px]">
                                    ${page.isCompleted ? `
                                        <div class="mic-btn opacity-40 mb-2"><i class="ph ph-check"></i></div>
                                        <p class="${page.hideScore ? 'text-indigo-500' : 'text-green-500'} font-bold status-large mb-2">${page.hideScore ? 'Bien essayé !' : 'Très bien !'}</p>
                                    ` : `
                                        <button id="mic-btn" class="mic-btn opacity-50 cursor-not-allowed" disabled onclick="toggleRecording('${page.target}')"><i class="ph ph-microphone"></i></button>
                                        <p id="speech-status" class="text-slate-500 font-medium text-sm transition-all duration-300 mt-2 text-center px-4">Cliquez sur le micro pour parler</p>
                                        <p id="speech-tries" class="text-[10px] text-slate-400 mt-1 uppercase tracking-widest">Essai: 0 / 2</p>
                                    `}
                                </div>
                            </div>
                        `;
                        break;

                    case 'outro':
                        html = `<div class="flex flex-col items-center w-full"><div class="text-5xl shrink-0 text-indigo-500 mb-4"><i class="ph ph-sparkle"></i></div><p class="desc-text font-medium text-center px-4 max-w-3xl">${page.text}</p></div>`;
                        break;
                }

                container.innerHTML = html;
                container.classList.add('active');

                if (page.audio) playBackgroundAudio(page.audio, 500);
                if (page.type === 'speech' && !page.isCompleted) setTimeout(() => playInteractionWithMicLock(page.targetAudio), 500);
            }, 50);
        }

        async function toggleRecording(target) {
            const btn = document.getElementById('mic-btn'); if (!btn || btn.disabled) return;
            if (btn.classList.contains('recording')) { stopRecordingManually(); } else {
                try {
                    currentStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(currentStream); audioChunks = [];
                    mediaRecorder.ondataavailable = (event) => audioChunks.push(event.data);
                    mediaRecorder.onstop = async () => {
                        stopMicrophone();
                        const base64Audio = (await new Promise(r => { const f = new FileReader(); f.onload = () => r(f.result); f.readAsDataURL(new Blob(audioChunks, { type: 'audio/wav' })); })).split(',')[1];
                        await verifySpeech(base64Audio, target);
                    };
                    mediaRecorder.start(); btn.classList.add('recording');
                    if (recordingTimer) clearTimeout(recordingTimer);
                    recordingTimer = setTimeout(() => { if (mediaRecorder && mediaRecorder.state === "recording") stopRecordingManually(); }, RECORDING_LIMIT);
                } catch (err) {}
            }
        }

        function stopRecordingManually() { 
            if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop(); 
            stopMicrophone();
            const btn = document.getElementById('mic-btn'); 
            if (btn) btn.classList.remove('recording'); 
            if (recordingTimer) clearTimeout(recordingTimer); 
        }

        function stopMicrophone() { 
            if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); currentStream = null; } 
        }

        async function verifySpeech(audioBase64, referenceText) {
            const status = document.getElementById('speech-status'); 
            const triesDisplay = document.getElementById('speech-tries');
            const page = pages[currentPage]; 
            const maxTries = 2;
            
            speechTries++; 
            if(triesDisplay) triesDisplay.innerText = `Essai: ${speechTries} / ${maxTries}`;
            
            try {
                const res = await fetch(CLOVA_API_FUNCTION_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ 
                        audioBase64: audioBase64, 
                        languageCode: "Kor", 
                        referenceText: referenceText 
                    }) 
                });
                const result = await res.json();
                let recognizedText = result.text || result.recognizedText || "";
                let score = result.score || calculateSimilarity(referenceText, recognizedText);
                page.score = score;

                if (score >= 50) {
                    // Success
                    correctSound.triggerAttackRelease(['G5', 'C6'], '4n'); 
                    page.isCompleted = true;
                    document.getElementById('speech-ui-container').innerHTML = `
                        <div class="mic-btn opacity-40 mb-2"><i class="ph ph-check"></i></div>
                        <p class="text-green-500 font-bold status-large mb-2">Très bien !</p>
                        <div class="bg-indigo-50 border border-indigo-100 rounded-xl px-4 py-2 flex items-center gap-2">
                            <i class="ph ph-target text-indigo-500 text-xl"></i>
                            <span class="text-indigo-600 font-bold">Précision : ${page.score}%</span>
                        </div>`;
                    document.getElementById('next-btn').disabled = false;
                } else if (speechTries >= maxTries) {
                    // Final Fail - Pass without score
                    page.isCompleted = true; 
                    page.hideScore = true; 
                    correctSound.triggerAttackRelease(['G5', 'C6'], '4n');
                    document.getElementById('speech-ui-container').innerHTML = `
                        <div class="mic-btn opacity-40 mb-2"><i class="ph ph-check"></i></div>
                        <p class="text-indigo-500 font-bold status-large mb-2">Bien essayé !</p>`;
                    document.getElementById('next-btn').disabled = false;
                } else {
                    // First Fail - Retry
                    playInteractionWithMicLock(page.targetAudio);
                    if (status) { 
                        status.innerText = "Essayons encore une fois !"; 
                        status.className = "text-orange-500 font-bold mt-2 text-center px-4"; 
                    }
                }
            } catch (error) { 
                if (speechTries >= maxTries) { 
                    page.isCompleted = true; 
                    document.getElementById('next-btn').disabled = false; 
                } 
            }
        }

        function calculateSimilarity(ref, hyp) {
            ref = ref.replace(/[?.,!\s]/g, ''); hyp = hyp.replace(/[?.,!\s]/g, ''); 
            if (ref === hyp) return 100;
            const matrix = Array.from({ length: ref.length + 1 }, (_, i) => [i]);
            for (let j = 1; j <= hyp.length; j++) matrix[0][j] = j;
            for (let i = 1; i <= ref.length; i++) 
                for (let j = 1; j <= hyp.length; j++) 
                    matrix[i][j] = ref[i-1] === hyp[j-1] ? matrix[i-1][j-1] : Math.min(matrix[i-1][j-1]+1, matrix[i][j-1]+1, matrix[i-1][j]+1);
            return Math.max(0, Math.round(((Math.max(ref.length, hyp.length) - matrix[ref.length][hyp.length]) / Math.max(ref.length, hyp.length)) * 100));
        }
    </script>
