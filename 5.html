<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 phrases essentielles - Dire « Au revoir »</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Poppins:wght@400;600&display=swap');

        :root {
            --primary: #4F46E5;
            --primary-dark: #3730A3;
            --bg-color: #F8FAFC;
            --nav-height: 70px;
        }

        body {
            font-family: 'Poppins', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            overflow: hidden; 
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            color: #1E293B;
        }

        .app-container {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2vh 4vw;
            box-sizing: border-box;
            overflow: hidden;
            width: 100%;
        }

        .content-box {
            width: 100%;
            max-width: 1200px;
            max-height: 100%;
            min-height: 0;
            margin: auto;
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .content-box.active {
            opacity: 1;
            transform: translateY(0);
        }

        .title-main {
            font-size: clamp(1.5rem, 5vh, 3.5rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1.5vh;
            flex-shrink: 0;
        }

        .subtitle-main {
            font-size: clamp(1rem, 2.5vh, 1.5rem);
            color: var(--primary);
            font-weight: 500;
            margin-bottom: 1vh;
            flex-shrink: 0;
        }

        .desc-text {
            font-size: clamp(1rem, 2.5vh, 1.7rem);
            line-height: 1.5;
            max-width: 800px;
            width: 100%;
            margin-left: auto;
            margin-right: auto;
            flex-shrink: 1;
            min-height: 0; 
            overflow-y: auto;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .desc-text::-webkit-scrollbar { width: 6px; }
        .desc-text::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }

        .char-card {
            background: white;
            border-radius: clamp(1rem, 3vh, 2rem);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            padding: clamp(1rem, 4vh, 3rem);
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: clamp(120px, 20vw, 320px);
            max-height: 55vh;
            border: 2px solid #F1F5F9;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }

        .nav-bar {
            width: 100%;
            height: var(--nav-height);
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid #E2E8F0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            z-index: 100;
            box-sizing: border-box;
        }

        .btn-nav {
            padding: 0.6rem clamp(1rem, 2vw, 1.5rem);
            border-radius: 9999px;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: clamp(0.875rem, 2vh, 1rem);
        }

        .btn-nav:disabled { opacity: 0.2; cursor: not-allowed; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-secondary { color: #64748B; border: 1px solid #CBD5E1; }

        .quiz-option { cursor: pointer; user-select: none; }
        .quiz-option.selected { border-color: var(--primary); background: #EEF2FF; color: var(--primary-dark); transform: scale(1.02); }
        .quiz-option.correct { border-color: #10B981 !important; background: #ECFDF5 !important; color: #059669 !important; }
        .quiz-option.wrong { border-color: #EF4444 !important; background: #FEF2F2 !important; color: #DC2626 !important; }

        .mic-btn {
            width: clamp(60px, 10vh, 90px);
            height: clamp(60px, 10vh, 90px);
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.5rem, 4vh, 2.5rem);
            margin: 2vh auto;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .mic-btn:disabled { background: #CBD5E1; }
        .mic-btn.recording { background: #EF4444; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .status-large { font-size: clamp(1.2rem, 3.5vh, 1.8rem); font-weight: 600; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.4s; }

        @media (max-width: 640px) { .nav-bar { padding: 0 1rem; } .btn-nav span { display: none; } }
    </style>
</head>
<body>

    <main class="app-container">
        <div id="lesson-content" class="content-box"></div>
    </main>

    <nav class="nav-bar">
        <button id="prev-btn" class="btn-nav btn-secondary" onclick="movePage(-1)">
            <i class="ph ph-caret-left"></i> <span>Précédent</span>
        </button>
        <div id="progress" class="text-[10px] sm:text-xs font-bold text-slate-400 uppercase tracking-widest text-center"></div>
        <button id="next-btn" class="btn-nav btn-primary" onclick="movePage(1)">
            <span>Suivant</span> <i class="ph ph-caret-right"></i>
        </button>
    </nav>

    <script>
        const pages = [
            { type: 'cover', subtitle: '8 phrases essentielles', title: 'Dire « Au revoir »', btnText: 'Commencer', isCompleted: true },
            { type: 'text', text: "Bonjour ! Bienvenue dans la dernière leçon du programme « 8 phrases essentielles ». Dans cette leçon, nous allons apprendre les expressions utilisées pour dire au revoir.", audio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775163768/5-1_f3havb.wav', isCompleted: true },
            { 
                type: 'info-card', 
                cardText: '안녕히 가세요.', sub1: 'Partez bien', sub2: 'Au revoir', 
                cardAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775163901/S5-2_slow_vdqp3o.mp3', 
                text: "Lorsque l'on s'adresse à quelqu'un qui part, on dit « 안녕히 가세요 ». Cette phrase signifie littéralement « partez bien », ou « partez en paix ».", 
                audio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775163876/5-2_zptg6q.wav', 
                isCompleted: true 
            },
            { type: 'speech', text: 'Répétez après moi.', display: '안녕히 가세요.', sub1: 'Partez bien', sub2: 'Au revoir', target: '안녕히 가세요', targetAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775163901/S5-2_slow_vdqp3o.mp3', isCompleted: false },
            { type: 'speech', text: 'Répétez encore une fois.', display: '안녕히 가세요.', sub1: 'Partez bien', sub2: 'Au revoir', target: '안녕히 가세요', targetAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775163898/S5-1_fast_ygzkq9.mp3', isCompleted: false },
            { 
                type: 'info-card', 
                cardText: '안녕히 계세요.', sub1: 'Restez bien', sub2: 'Au revoir', 
                cardAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775163897/S5-1_slow_eh2ta1.mp3', 
                text: "En revanche, lorsque c'est vous qui partez, on dit « 안녕히 계세요 » au lieu de « 안녕히 가세요 ». Cette phrase signifie littéralement « restez bien» , « restez en paix », et s'adresse à la personne qui reste sur place.", 
                audio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775163880/5-3_cbug0p.wav', 
                isCompleted: true 
            },
            { type: 'speech', text: 'Répétez après moi.', display: '안녕히 계세요.', sub1: 'Restez bien', sub2: 'Au revoir', target: '안녕히 계세요', targetAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775163897/S5-1_slow_eh2ta1.mp3', isCompleted: false },
            { 
                type: 'multi-cards-audio', 
                cards: [
                    {text: '안녕히 가세요.', sub1: 'Partez bien', sub2: 'Au revoir', audio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775163898/S5-1_fast_ygzkq9.mp3'}, 
                    {text: '안녕히 계세요.', sub1: 'Restez bien', sub2: 'Au revoir', audio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775163900/S5-2_fast_aqienh.mp3'}
                ], 
                text: "Comme le français ne fait pas la distinction entre la personne qui part et celle qui reste pour dire au revoir, il faut beaucoup de pratique pour utiliser naturellement ces deux phrases dans la vie quotidienne. Écoutez et répétez-les plusieurs fois.", 
                audio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775163878/5-4_spnkp8.wav', 
                isCompleted: true 
            },
            { type: 'speech', text: 'Répétez encore une fois.', display: '안녕히 계세요.', sub1: 'Restez bien', sub2: 'Au revoir', target: '안녕히 계세요', targetAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775163900/S5-2_fast_aqienh.mp3', isCompleted: false },
            { type: 'single-quiz', question: "À quel registre de langue cette phrase est-elle conjuguée ?", quizAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775163900/S5-2_fast_aqienh.mp3', options: ['Formel', 'Poli', 'Informel', 'On ne peut pas savoir'], answer: 'Poli', isCompleted: false },
            { type: 'single-quiz', question: "Que dites-vous à quelqu'un qui reste alors que vous partez ?", options: ['안녕히 가세요.', '안녕히 계세요.'], answer: '안녕히 계세요.', isCompleted: false },
            { type: 'single-quiz', question: "Que dites-vous à quelqu'un qui s'en va ?", options: ['안녕히 가세요.', '안녕히 계세요.'], answer: '안녕히 가세요.', isCompleted: false },
            { type: 'input-quiz', question: "Remplissez le blanc.", quizAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775163898/S5-1_fast_ygzkq9.mp3', prefix: "안녕히", suffix: ".", answer: "가세요", isCompleted: false },
            { type: 'input-quiz', question: "Remplissez le blanc.", quizAudio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775163900/S5-2_fast_aqienh.mp3', prefix: "", suffix: ".", answer: "안녕히 계세요", isCompleted: false },
            { type: 'free-speech', question: "Essayez de le dire vous-même.", targetText: "Merci, au revoir.<br><span class='text-sm font-normal text-slate-500'>(à quelqu’un qui s’en va)</span>", targets: ["감사합니다 안녕히 가세요", "고마워요 안녕히 가세요", "감사합니다 안녕히가세요", "고마워요 안녕히가세요"], koreanHint: "감사합니다 / 고마워요<br>안녕히 가세요.", isCompleted: false },
            { type: 'free-speech', question: "Essayez de le dire vous-même.", targetText: "Je suis désolé, au revoir.<br><span class='text-sm font-normal text-slate-500'>(à quelqu’un qui y reste)</span>", targets: ["죄송합니다 안녕히 계세요", "미안해요 안녕히 계세요", "죄송합니다 안녕히계세요", "미안해요 안녕히계세요"], koreanHint: "죄송합니다 / 미안해요<br>안녕히 계세요.", isCompleted: false },
            { type: 'outro', text: "Excellent ! Vous avez maintenant terminé le programme « 8 phrases essentielles » et vous êtes capable de dire huit phrases en coréen. Bien sûr, savoir saluer ne suffit pas pour communiquer couramment en Corée, mais ça vous permettra de voyager et de rencontrer des Coréens avec beaucoup plus de confiance.", audio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775163880/5-5_nprhec.wav', isCompleted: true },
            { type: 'outro', text: "Maintenant, choisissez le thème qui vous intéresse parmi les programmes de niveau A1 et continuez votre apprentissage du coréen ! Si vous ne vous sentez pas encore tout à fait à l'aise with les huit phrases appris, n'hésitez pas à consulter la leçon supplémentaire pour vous entraîner davantage à l'oral.<br><br>Alors, on se retrouve très bientôt dans un autre programme. 안녕히 가세요!", audio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1775163725/5-6_qjwy1t.mp3', isCompleted: true }
        ];

        let currentPage = 0;
        let currentAudio = null;
        let interactionAudio = null;
        let backgroundAudioTimeout = null;
        let transitionSynth, correctSound, completionSound, wrongSound;
        let mediaRecorder;
        let audioChunks = [];
        let currentStream = null;
        let speechTries = 0;
        let recordingTimer = null;
        const RECORDING_LIMIT = 6000; 
        const CLOVA_API_FUNCTION_URL = 'https://coreeno.base44.app/api/functions/naverClovaSpeech';

        window.onload = () => {
            Tone.Destination.volume.value = -8;
            transitionSynth = new Tone.Synth().toDestination();
            correctSound = new Tone.PolySynth().toDestination();
            wrongSound = new Tone.PolySynth().toDestination();
            completionSound = new Tone.PolySynth().toDestination();
            renderPage();
            window.addEventListener('blur', stopAllAudio);
            window.addEventListener('resize', adjustTextFit);
        };

        function stopAllAudio() {
            if (backgroundAudioTimeout) { clearTimeout(backgroundAudioTimeout); backgroundAudioTimeout = null; }
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio = null; }
            if (interactionAudio) { interactionAudio.pause(); interactionAudio.currentTime = 0; interactionAudio = null; }
        }

        function playBackgroundAudio(url, delay = 0) {
            if (backgroundAudioTimeout) clearTimeout(backgroundAudioTimeout);
            if (!url) return; 
            backgroundAudioTimeout = setTimeout(() => {
                if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio = null; }
                currentAudio = new Audio(url);
                currentAudio.play().catch(e => {});
            }, delay);
        }

        function playInteractionAudio(url, onEndedCallback = null) {
            if (!url) { if (onEndedCallback) onEndedCallback(); return; }
            if (backgroundAudioTimeout) { clearTimeout(backgroundAudioTimeout); backgroundAudioTimeout = null; }
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio = null; }
            if (interactionAudio) { interactionAudio.pause(); interactionAudio.currentTime = 0; }
            interactionAudio = new Audio(url);
            if (onEndedCallback) interactionAudio.onended = onEndedCallback;
            interactionAudio.play().catch(e => { if (onEndedCallback) onEndedCallback(); });
        }

        window.playInteractionWithMicLock = function(url) {
            const micBtn = document.getElementById('mic-btn');
            if (micBtn && micBtn.classList.contains('recording')) return;
            if (micBtn) { micBtn.disabled = true; micBtn.classList.add('opacity-50', 'cursor-not-allowed'); }
            playInteractionAudio(url, () => {
                const btn = document.getElementById('mic-btn');
                if (btn && !btn.classList.contains('recording')) {
                    btn.disabled = false; btn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            });
        };

        function movePage(step) {
            const nextIdx = currentPage + step;
            if (nextIdx >= 0 && nextIdx < pages.length) {
                stopAllAudio();
                stopMicrophone(); 
                transitionSynth.triggerAttackRelease("C4", "8n");
                currentPage = nextIdx;
                speechTries = 0; 
                renderPage();
            }
        }

        function renderPage() {
            const page = pages[currentPage];
            const container = document.getElementById('lesson-content');
            const nextBtn = document.getElementById('next-btn');
            const prevBtn = document.getElementById('prev-btn');
            const progress = document.getElementById('progress');
            const navBar = document.querySelector('.nav-bar');

            progress.innerText = `Page ${currentPage + 1} / ${pages.length}`;
            container.classList.remove('active');
            
            setTimeout(() => {
                container.innerHTML = '';
                let html = '';

                if (page.type === 'outro') { navBar.style.display = 'none'; } 
                else {
                    navBar.style.display = 'flex';
                    nextBtn.disabled = !page.isCompleted;
                    prevBtn.disabled = (currentPage === 0);
                    nextBtn.style.display = (currentPage === 0) ? 'none' : 'flex';
                    prevBtn.style.display = (currentPage === 0) ? 'none' : 'flex';
                }

                switch (page.type) {
                    case 'cover':
                        html = `<div class="flex flex-col items-center w-full"><h2 class="subtitle-main">${page.subtitle}</h2><h1 class="title-main">${page.title}</h1><button onclick="movePage(1)" class="mt-4 px-10 py-3 bg-indigo-600 text-white rounded-full text-lg font-bold hover:bg-indigo-700 transition-all shadow-lg shrink-0">${page.btnText}</button></div>`;
                        break;

                    case 'text':
                        html = `<div class="flex flex-col items-center w-full"><p class="desc-text font-medium mt-6">${page.text}</p></div>`;
                        break;

                    case 'info-card':
                        html = `
                            <div class="flex flex-col items-center w-full">
                                <div class="char-card mb-6 px-6 sm:px-12 shrink-0 cursor-pointer hover:scale-105" onclick="playInteractionAudio('${page.cardAudio}')">
                                    <div class="font-bold text-indigo-700 tracking-tight text-center leading-tight" style="font-size: clamp(2rem, 6vh, 4rem);">${page.cardText}</div>
                                    <p class="text-indigo-400 font-bold uppercase tracking-widest text-xs sm:text-sm mt-3 text-center px-2">${page.sub1}</p>
                                    <p class="text-slate-500 font-medium text-sm sm:text-base mt-1 text-center">${page.sub2}</p>
                                    <div class="mt-3 text-indigo-300 text-center"><i class="ph ph-speaker-high text-2xl sm:text-3xl"></i></div>
                                </div>
                                <p class="desc-text mt-2">${page.text}</p>
                            </div>
                        `;
                        break;

                    case 'multi-cards-audio':
                        html = `
                            <div class="flex flex-col items-center w-full">
                                <div class="flex flex-row gap-2 sm:gap-4 mb-4 sm:mb-8 shrink-0 w-full max-w-4xl justify-center px-0 sm:px-2">
                                    ${page.cards.map(c => `
                                        <div class="char-card !min-w-0 flex-1 cursor-pointer px-2 py-4 sm:px-6 sm:py-6 hover:scale-105 hover:border-indigo-200 transition-all border-2 border-slate-100 shadow-sm" onclick="playInteractionAudio('${c.audio}')">
                                            <div class="text-indigo-700 text-center flex-1 flex flex-col items-center justify-center w-full font-bold leading-snug" style="font-size: clamp(0.9rem, 3vw, 1.5rem);">${c.text}</div>
                                            <p class="text-indigo-400 font-bold uppercase tracking-widest text-[10px] sm:text-xs mt-2 text-center">${c.sub1}</p>
                                            <p class="text-slate-500 font-medium text-[10px] sm:text-xs text-center">${c.sub2}</p>
                                            <div class="mt-2 sm:mt-4 text-indigo-300 text-center shrink-0"><i class="ph ph-speaker-high text-xl sm:text-3xl"></i></div>
                                        </div>
                                    `).join('')}
                                </div>
                                <p class="desc-text mt-2">${page.text}</p>
                            </div>
                        `;
                        break;

                    case 'speech':
                        html = `
                            <div class="flex flex-col items-center w-full">
                                <h2 class="subtitle-main text-slate-900 mb-4">${page.text}</h2>
                                <div class="char-card shrink-0 mb-4 cursor-pointer hover:scale-105 hover:shadow-lg hover:border-indigo-300 transition-all border-2 border-slate-100" onclick="playInteractionWithMicLock('${page.targetAudio}')">
                                    <div id="target-char" class="font-bold tracking-tight text-center leading-tight transition-colors duration-500 ${page.isCompleted && !page.hideScore ? 'text-green-500' : 'text-indigo-600'}" style="font-size: clamp(2rem, 6vh, 4rem);">${page.display}</div>
                                    <p class="text-indigo-500 font-bold uppercase tracking-widest text-xs sm:text-sm mt-3 text-center px-2">${page.sub1}</p>
                                    <p class="text-slate-600 font-medium text-sm sm:text-base mt-1 text-center">${page.sub2}</p>
                                    <div class="mt-3 bg-indigo-50 text-indigo-500 rounded-full p-2 hover:bg-indigo-100 transition-colors"><i class="ph ph-speaker-high text-2xl"></i></div>
                                </div>
                                <div id="speech-ui-container" class="flex flex-col items-center shrink-0 min-h-[140px]">
                                    ${page.isCompleted ? `
                                        <div class="mic-btn opacity-40 mb-2"><i class="ph ph-check"></i></div>
                                        <p class="${page.hideScore ? 'text-indigo-500' : 'text-green-500'} font-bold status-large mb-2">${page.hideScore ? 'Bien essayé !' : 'Très bien !'}</p>
                                        ${!page.hideScore && page.score !== undefined ? `<div class="bg-indigo-50 border border-indigo-100 rounded-xl px-4 py-2 flex items-center gap-2"><i class="ph ph-target text-indigo-500 text-xl"></i><span class="text-indigo-600 font-bold">Précision : ${page.score}%</span></div>` : ''}
                                    ` : `
                                        <button id="mic-btn" class="mic-btn opacity-50 cursor-not-allowed" disabled onclick="toggleRecording('${page.target}')"><i class="ph ph-microphone"></i></button>
                                        <p id="speech-status" class="text-slate-500 font-medium text-sm transition-all duration-300 mt-2 text-center">Cliquez sur le micro pour parler</p>
                                        <p id="speech-tries" class="text-[10px] text-slate-400 mt-1 uppercase">Essai: 0 / 2</p>
                                    `}
                                </div>
                            </div>
                        `;
                        break;

                    case 'single-quiz':
                        html = `
                            <div class="flex flex-col items-center w-full max-h-full min-h-0 justify-center flex-1">
                                <h2 class="subtitle-main text-slate-900 mb-6 text-center px-4 max-w-2xl">${page.question}</h2>
                                ${page.quizAudio ? `<button onclick="playInteractionAudio('${page.quizAudio}')" class="w-16 h-16 shrink-0 rounded-full bg-indigo-50 text-indigo-600 text-2xl flex items-center justify-center hover:bg-indigo-100 transition-all shadow-inner mb-6"><i class="ph ph-speaker-high"></i></button>` : ''}
                                <div class="flex flex-col sm:flex-row flex-wrap justify-center gap-2 sm:gap-3 w-full max-w-3xl px-2">
                                    ${page.options.map(opt => `
                                        <button class="quiz-option px-4 py-2 sm:px-6 sm:py-3 text-base sm:text-xl font-bold rounded-xl border-2 border-slate-200 bg-white hover:border-indigo-300 transition-all ${page.isCompleted && page.answer === opt ? 'correct' : ''}" onclick="validateSingleQuiz(this, '${opt}')">${opt}</button>
                                    `).join('')}
                                </div>
                                <div class="h-14 mt-4 flex items-center justify-center shrink-0 w-full relative">
                                    <p id="quiz-feedback" class="text-base sm:text-lg font-bold m-0 text-center w-full absolute" ${!page.isCompleted ? 'style="display:none;"' : ''}>${page.isCompleted ? '<span class="text-green-500">Excellent !</span>' : ''}</p>
                                </div>
                            </div>
                        `;
                        break;

                    case 'input-quiz':
                        html = `
                            <div class="flex flex-col items-center w-full max-h-full min-h-0 justify-center flex-1">
                                <h2 class="subtitle-main text-slate-900 mb-6 text-center px-4 max-w-2xl">Remplissez le blanc.</h2>
                                ${page.quizAudio ? `<button onclick="playInteractionAudio('${page.quizAudio}')" class="w-16 h-16 shrink-0 rounded-full bg-indigo-50 text-indigo-600 text-2xl flex items-center justify-center hover:bg-indigo-100 transition-all shadow-inner mb-8"><i class="ph ph-speaker-high"></i></button>` : ''}
                                <div class="flex items-center justify-center gap-1 sm:gap-2 mb-8">
                                    ${page.prefix ? `<span class="text-3xl sm:text-5xl font-bold text-slate-800">${page.prefix}</span>` : ''}
                                    <input type="text" id="blank-input" class="w-48 sm:w-64 border-b-4 border-indigo-400 bg-transparent text-center focus:outline-none text-indigo-600 text-3xl sm:text-5xl pb-1" autocomplete="off" ${page.isCompleted ? `value="${page.answer}" disabled` : ''} />
                                    <span class="text-3xl sm:text-5xl font-bold text-slate-800">${page.suffix}</span>
                                </div>
                                <div class="h-14 mt-2 flex items-center justify-center shrink-0 w-full relative">
                                    <button id="input-valider-btn" onclick="validateInputQuiz()" class="btn-primary flex rounded-full px-8 py-2 sm:px-10 sm:py-3 font-bold text-sm sm:text-lg shadow-md hover:scale-105 transition-transform absolute" ${page.isCompleted ? 'style="display:none;"' : ''}>Valider</button>
                                    <p id="quiz-feedback" class="text-base sm:text-lg font-bold m-0 text-center w-full absolute" ${!page.isCompleted ? 'style="display:none;"' : ''}>${page.isCompleted ? '<span class="text-green-500">Excellent !</span>' : ''}</p>
                                </div>
                            </div>
                        `;
                        break;

                    case 'free-speech':
                        const showText = page.isCompleted || speechTries >= 2;
                        html = `
                            <div class="flex flex-col items-center w-full">
                                <h2 class="subtitle-main text-slate-900 mb-4">Essayez de le dire vous-même.</h2>
                                <div class="char-card shrink-0 mb-4 px-10 py-10 flex flex-col items-center">
                                    <div class="font-bold tracking-tight text-center leading-tight text-slate-800" style="font-size: clamp(2rem, 6vh, 4rem);">${page.targetText}</div>
                                    <div id="free-speech-text" class="mt-4 text-indigo-600 font-bold text-xl sm:text-2xl transition-opacity duration-300 ${showText ? 'block' : 'hidden'}">${page.koreanHint}</div>
                                </div>
                                <div id="speech-ui-container" class="flex flex-col items-center shrink-0 min-h-[140px]">
                                    ${page.isCompleted ? `
                                        <div class="mic-btn opacity-40 mb-2"><i class="ph ph-check"></i></div>
                                        <p class="${page.hideScore ? 'text-indigo-500' : 'text-green-500'} font-bold status-large mb-2">${page.hideScore ? 'Bien essayé !' : 'Très bien !'}</p>
                                    ` : `
                                        <button id="mic-btn" class="mic-btn" onclick="toggleRecording()"><i class="ph ph-microphone"></i></button>
                                        <p id="speech-status" class="text-slate-500 font-medium text-sm transition-all duration-300 mt-2 text-center">Cliquez sur le micro pour parler</p>
                                        <p id="speech-tries" class="text-[10px] text-slate-400 mt-1 uppercase">Essai: ${speechTries} / 3</p>
                                    `}
                                </div>
                            </div>
                        `;
                        break;

                    case 'outro':
                        html = `<div class="flex flex-col items-center w-full"><div class="text-5xl shrink-0 text-indigo-500 mb-4"><i class="ph ph-sparkle"></i></div><p class="desc-text font-medium text-center">${page.text}</p></div>`;
                        completionSound.triggerAttackRelease(["E5", "G5", "C6", "E6"], "2n");
                        break;
                }

                container.innerHTML = html;
                requestAnimationFrame(() => adjustTextFit());
                container.classList.add('active');

                if (page.audio) playBackgroundAudio(page.audio, 500);
                if (page.type === 'speech' && !page.isCompleted) setTimeout(() => playInteractionWithMicLock(page.targetAudio), 500);
            }, 50);
        }

        function adjustTextFit() {
            const descTexts = document.querySelectorAll('.desc-text');
            descTexts.forEach(descText => {
                descText.style.fontSize = ''; descText.style.lineHeight = '';
                let size = parseFloat(window.getComputedStyle(descText).fontSize);
                let attempts = 40; const minSize = 13; 
                while (descText.scrollHeight > descText.clientHeight + 2 && size > minSize && attempts > 0) {
                    size -= 0.5; descText.style.fontSize = size + 'px'; descText.style.lineHeight = '1.35'; attempts--;
                }
            });
        }

        window.validateSingleQuiz = function(btn, selected) {
            const page = pages[currentPage]; if (page.isCompleted) return;
            if (selected === page.answer) {
                btn.classList.add('correct'); correctSound.triggerAttackRelease(['G5', 'C6'], '4n');
                document.getElementById('quiz-feedback').innerHTML = '<span class="text-green-500">Excellent !</span>';
                document.getElementById('quiz-feedback').style.display = 'block';
                page.isCompleted = true; document.getElementById('next-btn').disabled = false;
            } else {
                btn.classList.add('wrong', 'animate-shake'); wrongSound.triggerAttackRelease(['G3', 'F3'], '8n');
                setTimeout(() => btn.classList.remove('wrong', 'animate-shake'), 1000);
            }
        };

        window.validateInputQuiz = function() {
            const page = pages[currentPage]; if (page.isCompleted) return;
            const input = document.getElementById('blank-input');
            const userVal = input.value.trim().replace(/\s+/g, '');
            const targetVal = page.answer.replace(/\s+/g, '');
            if (userVal === targetVal) {
                input.disabled = true; correctSound.triggerAttackRelease(['G5', 'C6'], '4n');
                document.getElementById('input-valider-btn').style.display = 'none';
                document.getElementById('quiz-feedback').innerHTML = '<span class="text-green-500">Excellent !</span>';
                document.getElementById('quiz-feedback').style.display = 'block';
                page.isCompleted = true; document.getElementById('next-btn').disabled = false;
            } else {
                page.tries = (page.tries || 0) + 1;
                if (page.tries >= 2) {
                    input.value = page.answer; input.disabled = true;
                    document.getElementById('input-valider-btn').style.display = 'none';
                    document.getElementById('quiz-feedback').innerHTML = '<span class="text-orange-500">Voici la réponse.</span>';
                    document.getElementById('quiz-feedback').style.display = 'block';
                    page.isCompleted = true; document.getElementById('next-btn').disabled = false;
                } else {
                    input.classList.add('animate-shake'); wrongSound.triggerAttackRelease(['G3', 'F3'], '8n');
                    setTimeout(() => input.classList.remove('animate-shake'), 1000);
                }
            }
        };

        async function toggleRecording(target) {
            const btn = document.getElementById('mic-btn'); if (!btn || btn.disabled) return;
            if (btn.classList.contains('recording')) { stopRecordingManually(); } else {
                try {
                    currentStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(currentStream); audioChunks = [];
                    mediaRecorder.ondataavailable = (event) => audioChunks.push(event.data);
                    mediaRecorder.onstop = async () => {
                        const blob = new Blob(audioChunks, { type: 'audio/wav' });
                        const reader = new FileReader(); reader.readAsDataURL(blob);
                        reader.onloadend = async () => { 
                            const base64 = reader.result.split(',')[1];
                            verifySpeech(base64, target); 
                        };
                        stopMicrophone();
                    };
                    mediaRecorder.start(); btn.classList.add('recording');
                    recordingTimer = setTimeout(() => { if (mediaRecorder.state === "recording") stopRecordingManually(); }, RECORDING_LIMIT);
                } catch (err) { document.getElementById('speech-status').innerText = "Erreur micro."; }
            }
        }

        function stopRecordingManually() { if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop(); const btn = document.getElementById('mic-btn'); if (btn) btn.classList.remove('recording'); clearTimeout(recordingTimer); }
        function stopMicrophone() { if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); currentStream = null; } }

        async function verifySpeech(audioBase64, referenceText) {
            const page = pages[currentPage]; const maxTries = page.type === 'free-speech' ? 3 : 2;
            speechTries++; if(document.getElementById('speech-tries')) document.getElementById('speech-tries').innerText = `Essai: ${speechTries} / ${maxTries}`;
            try {
                const response = await fetch(CLOVA_API_FUNCTION_URL, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ audioBase64: audioBase64, languageCode: "Kor", referenceText: referenceText || (page.targets ? page.targets[0] : "") })
                });
                const result = await response.json();
                const recognized = (result.text || "").replace(/[?.,!\s]/g, '');
                let score = result.score || 0;
                
                if (page.type === 'free-speech') {
                    score = Math.max(...page.targets.map(t => calculateSimilarity(t, recognized)));
                } else if (score === 0) {
                    score = calculateSimilarity(referenceText, recognized);
                }
                
                page.score = score;
                const threshold = page.type === 'free-speech' ? 90 : 50;

                if (score >= threshold) { finishSpeech(score); } 
                else if (speechTries >= maxTries) { finishSpeechFail(); } 
                else {
                    if (page.type === 'free-speech' && speechTries === 2) document.getElementById('free-speech-text').classList.replace('hidden', 'block');
                    else if (page.type === 'speech') playInteractionWithMicLock(page.targetAudio);
                    document.getElementById('speech-status').innerText = "Essayons encore !";
                }
            } catch (error) { if (speechTries >= maxTries) finishSpeechFail(); }
        }

        function finishSpeech(score) {
            const page = pages[currentPage]; page.isCompleted = true; page.score = score;
            correctSound.triggerAttackRelease(['G5', 'C6'], '4n'); document.getElementById('next-btn').disabled = false;
            renderPage();
        }

        function finishSpeechFail() {
            const page = pages[currentPage]; page.isCompleted = true; page.hideScore = true;
            correctSound.triggerAttackRelease(['G5', 'C6'], '4n'); document.getElementById('next-btn').disabled = false;
            renderPage();
        }

        function calculateSimilarity(ref, hyp) {
            ref = ref.replace(/[?.,!\s]/g, ''); hyp = hyp.replace(/[?.,!\s]/g, ''); if (ref === hyp) return 100;
            const matrix = Array.from({ length: ref.length + 1 }, (_, i) => [i]);
            for (let j = 1; j <= hyp.length; j++) matrix[0][j] = j;
            for (let i = 1; i <= ref.length; i++) for (let j = 1; j <= hyp.length; j++) matrix[i][j] = ref[i-1] === hyp[j-1] ? matrix[i-1][j-1] : Math.min(matrix[i-1][j-1]+1, matrix[i][j-1]+1, matrix[i-1][j]+1);
            return Math.max(0, Math.round(((Math.max(ref.length, hyp.length) - matrix[ref.length][hyp.length]) / Math.max(ref.length, hyp.length)) * 100));
        }
    </script>
</body>
